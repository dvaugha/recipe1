<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Recipe1 | Pocket Kitchen</title>
    <link rel="stylesheet" href="style.css">
    <!-- iOS App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Recipe1">
</head>

<body>
    <header>
        <h1>Dinner Tonight</h1>
        <div id="item-count" style="font-size: 14px; color: var(--text-light);">50 Recipes</div>
    </header>

    <div class="filter-bar" id="filter-bar">
        <div class="chip active" onclick="filterCuisine('All')">All</div>
        <div class="chip" onclick="filterCuisine('Italian')">Italian</div>
        <div class="chip" onclick="filterCuisine('Mexican')">Mexican</div>
        <div class="chip" onclick="filterCuisine('Asian')">Asian</div>
        <div class="chip" onclick="filterCuisine('American')">American</div>
        <div class="chip" onclick="filterCuisine('Healthy')">Healthy</div>
        <div class="chip" onclick="filterCuisine('Southern')">Southern</div>
    </div>

    <main class="container">
        <div id="recipe-grid" class="recipe-grid">
            <!-- Recipes will be injected here -->
        </div>
    </main>

    <!-- Grocery List Modal -->
    <div id="grocery-modal" class="modal">
        <div class="modal-header">
            <button class="btn-close" onclick="closeGroceryModal()">✕</button>
            <span style="font-weight: 600;">Grocery List</span>
            <div style="width: 32px;"></div>
        </div>
        <div class="modal-content">
            <div id="grocery-status"
                style="background: #e1f5fe; color: #01579b; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 600; text-align: center; display: none;">
                ✓ List Copied to Clipboard!
            </div>
            <div id="grocery-items-list"
                style="background: #f9f9f9; padding: 20px; border-radius: 16px; margin-bottom: 24px;">
                <!-- List items here -->
            </div>
            <a href="mobilenotes://" id="notes-app-link" class="btn-grocery" style="background: #f5a623;">
                📔 Open Notes App to Paste
            </a>
            <p style="font-size: 12px; color: var(--text-light); text-align: center; margin-top: 12px;">
                The list has been copied. Open Notes and paste into your Grocery List folder.
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
